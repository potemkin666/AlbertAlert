name: Feed validation

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'data/**'
      - 'scripts/**'
      - 'shared/**'
      - 'tests/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'data/**'
      - 'scripts/**'
      - 'shared/**'
      - 'tests/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  validate-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BRIALERT_ENABLE_PLAYWRIGHT_FALLBACK: ${{ vars.BRIALERT_ENABLE_PLAYWRIGHT_FALLBACK || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.18.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        if: ${{ env.BRIALERT_ENABLE_PLAYWRIGHT_FALLBACK == 'true' }}
        run: npx playwright install chromium --with-deps

      - name: Validate feed data files
        run: npm run validate:feed-data

      - name: Validate compiled source catalog freshness
        run: npm run check:sources:freshness

      - name: Validate London source health
        env:
          BRIALERT_SOURCE_HEALTH_SCOPE: critical
          BRIALERT_SOURCE_HEALTH_CRITICAL_IDS: ct-policing-london,met-police-news,met-police-latest-news,city-of-london-police-news,city-of-london-police-news-html,city-of-london-police-newsroom,mopac-html,london-fire-brigade-news,tfl-press-releases-html,london-gov-press-releases-html
        run: npm run validate:source-health

      - name: Run decision-logic tests
        run: npm test

  build-feed-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-feed
    env:
      BRIALERT_ENABLE_PLAYWRIGHT_FALLBACK: ${{ vars.BRIALERT_ENABLE_PLAYWRIGHT_FALLBACK || 'false' }}
      BRIALERT_SCHEDULER_AB_MODE: control
      BRIALERT_MAX_HTML_SOURCES_PER_RUN: '10'
      BRIALERT_CONTROL_MAX_HTML_SOURCES_PER_RUN: '8'
      BRIALERT_MAX_HTML_PREFETCH_ITEMS: '4'
      BRIALERT_MAX_FEED_PREFETCH_ITEMS: '4'
      BRIALERT_FETCH_TIMEOUT_MS: '7000'
      BRIALERT_FETCH_MAX_RETRIES: '2'
      BRIALERT_FEED_SOURCE_CONCURRENCY: '3'
      BRIALERT_GUARDRAIL_MAX_RUNTIME_MS: '420000'
      BRIALERT_FAIL_ON_GUARDRAIL_VIOLATION: 'true'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '20.18.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Install Playwright Chromium
        if: ${{ env.BRIALERT_ENABLE_PLAYWRIGHT_FALLBACK == 'true' }}
        run: npx playwright install chromium --with-deps

      - name: Build live alert feed
        run: npm run build:feeds

      - name: Validate source remediation sweep artifact
        run: test -f data/source-remediation-sweep.json && test -f data/top-20-source-remediation.json

      - name: Validate generated feed output
        run: npm run validate:live-feed-output

      - name: Build smoke observability artifact
        if: always()
        run: |
          mkdir -p .ci-artifacts
          cp live-alerts.json .ci-artifacts/live-alerts.json 2>/dev/null || true
          cp data/source-remediation-sweep.json .ci-artifacts/source-remediation-sweep.json 2>/dev/null || true
          cp data/top-20-source-remediation.json .ci-artifacts/top-20-source-remediation.json 2>/dev/null || true
          node -e "const fs=require('fs');const p='live-alerts.json';if(!fs.existsSync(p)){process.exit(0)}const payload=JSON.parse(fs.readFileSync(p,'utf8'));const m=payload.runMetrics||{};const out={generatedAt:payload.generatedAt,sourceCount:payload.sourceCount,alertCount:payload.alertCount,runDurationMs:m.runDurationMs||null,coverage:m.coverage||null,failureReasons:m.failureReasons||{},guardrails:m.guardrails||{},buildWarning:payload.buildWarning||null};fs.writeFileSync('.ci-artifacts/feed-smoke-summary.json',JSON.stringify(out,null,2)+'\n');"

      - name: Enforce CI smoke runtime budget
        run: |
          node -e "const fs=require('fs');const payload=JSON.parse(fs.readFileSync('live-alerts.json','utf8'));const d=Number(payload?.runMetrics?.runDurationMs||0);const max=420000;if(!Number.isFinite(d)||d<=0){throw new Error('Missing runDurationMs in live-alerts.json runMetrics')}if(d>max){throw new Error('CI smoke runtime budget exceeded: '+d+'ms > '+max+'ms')}console.log('CI smoke runtime budget OK: '+d+'ms <= '+max+'ms')"

      - name: Upload feed smoke artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feed-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          path: .ci-artifacts
          if-no-files-found: warn
